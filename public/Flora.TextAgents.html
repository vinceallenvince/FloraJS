<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta name="keywords" content="JavaScript, Framework, Animation, Natural, System" />
  <meta name="description" content="FloraJS simulates natural systems using JavaScript." />
  <meta name="viewport" content = "user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name='apple-mobile-web-app-capable' content='yes' />
  <meta property='og:title' content='FloraJS' />
  <meta property='og:url' content='http://www.florajs.com' />
  <meta property='og:site_name' content='FloraJS' />
  <title>FloraJS | Simulate natural systems with JavaScript</title>
  <link rel="stylesheet" href="css/flora.min.css" type="text/css" charset="utf-8" />
  <script src="scripts/flora.min.js" type="text/javascript" charset="utf-8"></script>
  </head>
  <body>
    <script type="text/javascript" charset="utf-8">

      // Entities as text on the default DOMRenderer: every ant is a
      // real DOM text node — inspect, select and style them. Add
      // ?renderer=canvas to compare renderers; ?agents=N for
      // population.

      var TOTAL_CRUMBS = 8;
      var TOTAL_ANTS = parseInt((window.location.search.match(/[?&]agents=(\d+)/) || [])[1], 10) || 800;

      var rand = Flora.Utils.getRandomNumber;

      Flora.System.setup(function() {

        var world = this.add('World', {
          gravity: new Flora.Vector(),
          c: 0,
          color: [20, 18, 14]
        });

        var crumbs = [];
        for (var i = 0; i < TOTAL_CRUMBS; i++) {
          crumbs.push(this.add('Walker', {
            text: 'food',
            width: 26,
            height: 18,
            color: [255, 255, 255],
            perlinSpeed: 0.001,
            wrapWorldEdges: true,
            location: new Flora.Vector(rand(0, world.width), rand(0, world.height))
          }));
        }

        for (var j = 0; j < TOTAL_ANTS; j++) {
          // A few discrete greys (not a continuous range) keeps the
          // canvas renderer's glyph sprite cache small: it caches one
          // sprite per unique text/font/size/color combination.
          var grey = 110 + rand(0, 4) * 20;
          this.add('Agent', {
            text: 'fish',
            width: 14,
            height: rand(10, 18),
            color: [grey, grey, grey],
            maxSpeed: rand(3, 8),
            maxSteeringForce: rand(1, 3, true) * 0.5,
            seekTarget: crumbs[j % TOTAL_CRUMBS],
            flocking: true,
            desiredSeparation: 20,
            separateStrength: 1.1,
            wrapWorldEdges: true,
            velocity: new Flora.Vector(rand(-3, 3, true), rand(-3, 3, true)),
            location: new Flora.Vector(rand(0, world.width), rand(0, world.height))
          });
        }

        this.add('Caption', {
          text: 'Flora.TextAgents | ' + TOTAL_ANTS + ' ants',
          opacity: 0.4,
          borderColor: 'transparent',
          position: 'top center'
        });

        this.add('InputMenu', {
          opacity: 0.4,
          borderColor: 'transparent',
          position: 'bottom center'
        });
      });
      Flora.System.loop();
    </script>
  </body>
</html>
