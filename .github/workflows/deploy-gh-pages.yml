name: Deploy demos to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4

      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      # Overlay public/ onto the existing gh-pages tree. The branch also
      # carries doc/ and reports/ (generated by the old Grunt toolchain),
      # which master no longer builds — leave them untouched.
      - name: Deploy public/ to gh-pages
        run: |
          cp -R public/. site/
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy public/ from master @ ${GITHUB_SHA::7}"
            git push origin HEAD:gh-pages
          fi
