<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta name="keywords" content="JavaScript, Framework, Animation, Natural, System" />
  <meta name="description" content="FloraJS simulates natural systems using JavaScript." />
  <meta name="viewport" content = "user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name='apple-mobile-web-app-capable' content='yes' />
  <meta property='og:title' content='FloraJS' />
  <meta property='og:url' content='http://www.florajs.com' />
  <meta property='og:site_name' content='FloraJS' />
  <title>FloraJS | Simulate natural systems with JavaScript</title>
  <link rel="stylesheet" href="css/flora.min.css" type="text/css" charset="utf-8" />
  <script src="scripts/flora.min.js" type="text/javascript" charset="utf-8"></script>
  <script src="scripts/palette-tuner.js" type="text/javascript" charset="utf-8"></script>
  </head>
  <body>
    <script type="text/javascript" charset="utf-8">

      // A CanvasRenderer showcase: thousands of agents pursuing a
      // handful of wandering walkers. Add ?renderer=dom to run the
      // same scene on the default DOMRenderer and compare for
      // yourself; add ?agents=N to change the population.
      if (!/[?&]renderer=dom/.test(window.location.search)) {
        Flora.setRenderer(new Flora.CanvasRenderer());
      }

      var TOTAL_WALKERS = 12;
      // Override with ?agents=10000 to probe your machine's ceiling.
      var TOTAL_AGENTS = parseInt((window.location.search.match(/[?&]agents=(\d+)/) || [])[1], 10) || 3000;

      var rand = Flora.Utils.getRandomNumber;

      // The base palette as start -> end gradient pairs, editable live
      // via the PaletteTuner panel (top right). Defaults are an earthy
      // dirt -> sand -> khaki family so the swarm reads as one color
      // space; tune it, then "copy as code".
      var palettePairs = [
        { start: [110, 82, 52], end: [165, 130, 88] },
        { start: [178, 156, 110], end: [228, 208, 162] },
        { start: [140, 132, 88], end: [196, 186, 132] }
      ];

      function buildPalette(pairs) {
        var palette = new Flora.ColorPalette();
        for (var i = 0; i < pairs.length; i++) {
          palette.addColor({
            min: 6,
            max: 24,
            startColor: pairs[i].start.slice(),
            endColor: pairs[i].end.slice()
          });
        }
        return palette;
      }

      Flora.System.setup(function() {

        var world = this.add('World', {
          gravity: new Flora.Vector(),
          c: 0
        });

        var palette = buildPalette(palettePairs);

        var walkers = [];
        for (var i = 0; i < TOTAL_WALKERS; i++) {
          walkers.push(this.add('Walker', {
            width: 14,
            height: 14,
            color: [255, 255, 255],
            location: new Flora.Vector(rand(0, world.width), rand(0, world.height))
          }));

          // A little motor inside each walker: a dark dot parented to
          // the walker at a small offset, spinning its offsetAngle
          // each step. (Perlin walkers never rotate — their location
          // comes straight from noise — so the dot drives its own
          // orbit rather than riding the parent's angle.)
          this.add('Mover', {
            width: 5,
            height: 5,
            color: [70, 58, 40],
            borderRadius: 100,
            zIndex: 1,
            parent: walkers[i],
            offsetDistance: 4,
            offsetAngle: rand(0, 359),
            beforeStep: function() {
              this.offsetAngle += 20;
            },
            location: new Flora.Vector(world.width / 2, world.height / 2)
          });
        }

        // High speed with a moderate steering force makes agents chase
        // without stacking on their target; flocking makes pursuers of
        // the same walker school together on the way. The wide
        // desiredSeparation with a strong separate force holds each
        // school open — hundreds of agents share a walker, and if they
        // collapse into a pile, every agent's flocking neighborhood is
        // the whole pile and the physics cost explodes.
        for (var j = 0; j < TOTAL_AGENTS; j++) {
          var size = rand(1, 9, true);
          this.add('Agent', {
            width: size,
            height: size,
            color: palette.getColor(),
            maxSpeed: rand(6, 14),
            maxSteeringForce: rand(1, 3, true) * 0.5,
            seekTarget: walkers[j % TOTAL_WALKERS],
            flocking: true,
            desiredSeparation: 24,
            separateStrength: 1.2,
            wrapWorldEdges: true,
            velocity: new Flora.Vector(rand(-4, 4, true), rand(-4, 4, true)),
            location: new Flora.Vector(rand(0, world.width), rand(0, world.height)),
            // Opacity inversely proportional to speed: agents at rest
            // are solid, agents at their top speed fade to a streak.
            afterStep: function() {
              this.opacity = Flora.Utils.map(this.velocity.mag(), 0, this.maxSpeed, 1, 0.2);
            }
          });
        }

        this.add('Caption', {
          text: 'Flora.Canvas.ManyAgents | ' + TOTAL_AGENTS + ' agents',
          opacity: 0.4,
          borderColor: 'transparent',
          position: 'top center'
        });

        this.add('InputMenu', {
          opacity: 0.4,
          borderColor: 'transparent',
          position: 'bottom center'
        });
      });
      Flora.System.loop();

      // Live palette editing: rebuild the palette and re-roll every
      // agent's color. Colors are plain arrays read by the renderer
      // each frame, so mutation shows up on the next draw.
      PaletteTuner.init({
        colors: palettePairs,
        onChange: function(pairs) {
          var palette = buildPalette(pairs);
          var agents = Flora.System.getAllItemsByName('Agent');
          for (var i = 0; i < agents.length; i++) {
            agents[i].color = palette.getColor();
          }
        }
      });
    </script>
  </body>
</html>
